# Build the Hugo site, generate the CV PDF, and deploy over FTPS
name: Build and deploy Hugo site

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Build (without deploying) to validate pull requests
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

# Allow only one concurrent deployment per ref, skipping runs queued
# between the run in-progress and latest queued. However, do NOT cancel
# in-progress runs as we want to allow these production deployments to
# complete.
concurrency:
  group: "deploy-${{ github.ref }}"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.3
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build with Hugo
        env:
          # For maximum backward compatibility with Hugo modules
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo --minify
      - name: Generate CV PDF
        # The CV page only references self-hosted assets and the site is
        # built with relative URLs, so printing the local file is exactly
        # what a visitor's browser would print.
        run: |
          google-chrome --headless=new --no-sandbox --disable-gpu \
            --no-pdf-header-footer --virtual-time-budget=15000 \
            --print-to-pdf="$PWD/public/resume.pdf" \
            "file://$PWD/public/cv.html"
      - name: Upload site artifact
        uses: actions/upload-artifact@v6
        with:
          name: site
          path: public/

  # Deployment job — recorded as the "production" GitHub environment, so
  # the deployment and its URL show up on the repository home page.
  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://palaio.eu/
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v7
        with:
          name: site
          path: public
      - name: Deploy with FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.ftp_host }}
          username: ${{ secrets.ftp_user }}
          password: ${{ secrets.ftp_password }}
          protocol: ftps
          port: ${{ secrets.ftp_port }}
          security: strict
          local-dir: public/
