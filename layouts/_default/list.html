{{ define "main" }}
<div class="article-head section-alt">
  <div class="wrap-narrow"><h1>{{ .Title }}</h1></div>
</div>
<div class="section">
  <div class="wrap-narrow prose">
    {{ .Content }}
    <ul class="article-list">
      {{ range .Pages }}<li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>{{ end }}
    </ul>
  </div>
</div>
{{ end }}
