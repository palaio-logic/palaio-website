{{ $isExpertise := eq .Section "expertise" }}

    <a class="brand" href="{{ "/" | relURL }}">
      <img src="{{ "palaio_big_logo.webp" | relURL }}" alt="" aria-hidden="true">
      <span>{{ .Site.Title }}</span>
    </a>
    <nav class="nav-links">
      <a class="nav-plain" href="{{ "/" | relURL }}">Home</a>
      <a class="nav-plain {{ if $isExpertise }}active{{ end }}" href="{{ "/expertise/" | relURL }}">Expertise</a>
      <a class="nav-plain" href="{{ "cv.html" | relURL }}">CV</a>
      <a class="btn btn-primary" href="https://cal.com/victor-paleologue/call">Schedule a call</a>
    </nav>
  </div>
</header>
