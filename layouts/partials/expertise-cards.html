{{- /* Renders a grid of expertise cards.
       Call with: dict "pages" <slice of pages> */ -}}
<div class="card-grid">
  {{ range .pages }}
  <a class="xp-card" href="{{ .RelPermalink }}">
    {{ with .Params.icon }}<span class="xp-icon"><i class="{{ . }}"></i></span>{{ end }}
    <h3>{{ .Title }}</h3>
    <p>{{ .Description }}</p>
    <span class="xp-more">Explore&nbsp;→</span>
  </a>
  {{ end }}
</div>
