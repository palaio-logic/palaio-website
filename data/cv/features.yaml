      url: https://fediscience.org/@palaio
      icon: fab fa-mastodon
  details: |
    Robotics are like magic to me: tell the right words (software), and the robot
    will animate (hardware). For more than 10 years, my job has been to develop
    GUI tools and SDKs to help users become wizards of robotics. Such development
    involved intense teamwork, good organization, communication and a lot of
    programming skills.

    I specialize in AI for embedded software: I can bring machine learning,
    chatbots and task planning into robots, as well as mobile and web apps, and I
    have serious experience integrating tough code into custom targets. All of
    these are ingredients for better Human-Machine Interaction, working towards
    Human-Robot Interaction, the field I specialized in with my PhD at ISIR,
    Sorbonne Université.

