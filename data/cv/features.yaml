  details: |
    Robotics are magic: use the right words (software), and it
    will animate (hardware). After a dozen years in the field,
    the passion is still whole, and my experience has been rich:
    designing decision-making systems, core robotics software,
    SDKs, GUI tools (web, desktop); as a developer, a researcher,
    a software lead, a manager, scrum master or product owner.

    My know-how: integrating AI in a larger piece of interactive robotics software.
    LLMs, task planners, on embedded systems, with care for the performance
    required for Human-Robot Interaction.
    I keep nurturing deep programming and system skills,
    and am knowledgeable in many programming languages and frameworks.

